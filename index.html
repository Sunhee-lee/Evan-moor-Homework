/* ─── item lists per mode ─── */
function getItems(mode) {
  if (mode === "listening") {
    return ["wonders","bricks","comeon"].flatMap(s =>
      [0,1,2].map(i => ({ ck:`${s}_listen_${i}`, type:"bool" }))
    );
  }
  return [
    {ck:"voca",type:"bool"}, {ck:"dictation",type:"bool"}, {ck:"wrong_words",type:"opt"},
    {ck:"wonders_listen_0",type:"bool"},{ck:"wonders_listen_1",type:"bool"},{ck:"wonders_listen_2",type:"bool"},
    {ck:"wonders_hwb",type:"opt"},
    {ck:"bricks_listen_0",type:"bool"},{ck:"bricks_listen_1",type:"bool"},{ck:"bricks_listen_2",type:"bool"},
    {ck:"bricks_hwb",type:"opt"},
    {ck:"bricks_wb",type:"opt"},
    {ck:"comeon_listen_0",type:"bool"},{ck:"comeon_listen_1",type:"bool"},{ck:"comeon_listen_2",type:"bool"},
    {ck:"comeon_wb",type:"opt"},
    {ck:"john_paper",type:"opt"},
  ];
}
function countProgress(items, checks) {
  const total = items.length;
  const done  = items.filter(({ck,type}) =>
    type==="opt" ? checks[ck]==="done"||checks[ck]==="na" : !!checks[ck]
  ).length;
  return { total, done, pct: total===0?0:Math.round((done/total)*100) };
}

/* ════════════════════════════════
   CONFETTI
════════════════════════════════ */
function Confetti() {
  const COLS=["#FFD93D","#FF6B6B","#4ECDC4","#A29BFE","#2ED573","#FF4757","#FFA502","#74B9FF"];
  const ps=Array.from({length:70},(_,i)=>({
    id:i,color:COLS[i%COLS.length],left:Math.random()*100,
    delay:Math.random()*2.5,dur:2.2+Math.random()*1.8,
    size:8+Math.random()*14,round:i%3===0,
  }));
  return ps.map(p=>(
    <div key={p.id} style={{position:"fixed",left:`${p.left}%`,top:"-14px",
      width:p.size,height:p.size,background:p.color,zIndex:4001,
      borderRadius:p.round?"50%":"3px",pointerEvents:"none",
      animation:`fall ${p.dur}s ${p.delay}s linear infinite`}}/>
  ));
}

/* ════════════════════════════════
   PLANT GROWTH SVG  (씨앗 → 꽃)
════════════════════════════════ */
function PlantSVG({ pct }) {
  // stages: 0=seed, 1-20=sprout, 21-45=growing, 46-65=bud, 66-85=opening, 86-99=bloom, 100=full
  const stage = pct === 0 ? 0 : pct <= 20 ? 1 : pct <= 45 ? 2 : pct <= 65 ? 3 : pct <= 85 ? 4 : pct < 100 ? 5 : 6;
  const stemH = pct === 0 ? 0 : Math.min(52, 8 + pct * 0.46); // 0→52px
  const stemY = 76;

  // leaf opacity by stage
  const leafL = stage >= 2 ? Math.min(1,(stage-1)/3) : 0;
  const leafR = stage >= 3 ? Math.min(1,(stage-2)/3) : 0;

  // flower
  const flowerOp = stage >= 3 ? Math.min(1,(stage-2)/3) : 0;
  const petalScale = stage >= 3 ? Math.min(1,(stage-2)/4*1.3) : 0;
  const petalColors = stage===6 ? ["#FF6B9D","#FF9F43","#FFD93D","#6C5CE7","#00CEC9","#FF6B6B"] : ["#FFB3C8","#FFCF99","#FFF0AA","#C7B8F8","#A8EEE8","#FFAAAA"];

  const cx=40, cy=76-stemH;

  return (
    <svg width={80} height={90} viewBox="0 0 80 90" style={{overflow:"visible"}}>
      {/* soil */}
      <ellipse cx={40} cy={78} rx={28} ry={7} fill="#C8956C" opacity={.7}/>
      <ellipse cx={40} cy={76} rx={22} ry={5} fill="#A0725A" opacity={.8}/>

      {/* seed (stage 0) */}
      {pct === 0 && (
        <ellipse cx={40} cy={74} rx={7} ry={5} fill="#8B6914" opacity={.9}/>
      )}

      {/* stem */}
      {stemH > 0 && (
        <path d={`M 40 ${stemY} Q ${40 + (stage>=4?-4:3)} ${stemY - stemH*0.5} 40 ${stemY-stemH}`}
          stroke="#4CAF50" strokeWidth={3.5} fill="none" strokeLinecap="round"/>
      )}

      {/* left leaf */}
      {stemH > 12 && leafL > 0 && (
        <ellipse cx={40-12} cy={stemY-stemH*0.45} rx={10*leafL} ry={5*leafL}
          fill="#66BB6A" opacity={leafL}
          transform={`rotate(-35 ${40-12} ${stemY-stemH*0.45})`}/>
      )}
      {/* right leaf */}
      {stemH > 20 && leafR > 0 && (
        <ellipse cx={40+12} cy={stemY-stemH*0.62} rx={10*leafR} ry={5*leafR}
          fill="#81C784" opacity={leafR}
          transform={`rotate(35 ${40+12} ${stemY-stemH*0.62})`}/>
      )}

      {/* flower petals */}
      {flowerOp > 0 && stage >= 3 && [0,1,2,3,4,5].map((i) => {
        const angle = (i * 60) * Math.PI / 180;
        const pr = 9 * petalScale;
        const px = cx + Math.cos(angle) * pr * 1.7;
        const py = cy + Math.sin(angle) * pr * 1.7;
        return (
          <ellipse key={i} cx={px} cy={py}
            rx={pr} ry={pr*0.65}
            fill={petalColors[i]} opacity={flowerOp}
            transform={`rotate(${i*60+90} ${px} ${py})`}/>
        );
      })}

      {/* flower center */}
      {flowerOp > 0 && stage >= 3 && (
        <circle cx={cx} cy={cy} r={7*petalScale}
          fill={stage===6?"#FFD93D":"#FFA726"} opacity={flowerOp}/>
      )}

      {/* sparkles at 100% */}
      {stage === 6 && [
        [18,16],[62,12],[68,38],[14,48],[45,8]
      ].map(([sx,sy],i)=>(
        <text key={i} x={sx} y={sy} fontSize={10} textAnchor="middle" opacity={.85}>✨</text>
      ))}
    </svg>
  );
}

/* ════════════════════════════════
   RINGS
════════════════════════════════ */
function Rings({ prefix, checks, toggle, large, color="#A29BFE" }) {
  const [hover,setHover]=useState(null);
  return (
    <div style={{display:"flex",gap:14,justifyContent:"center"}}>
      {[0,1,2].map(i=>{
        const on = !!checks[`${prefix}_${i}`];
        const isHov = hover===i && !on;
        return (
          <div key={i}
            className={`ring${on?" on":""}${large?" lg":""}`}
            style={on
              ? {background:color,borderColor:color}
              : isHov ? {borderColor:color,color,transform:"scale(1.1)"} : {}}
            onMouseEnter={()=>setHover(i)}
            onMouseLeave={()=>setHover(null)}
            onClick={()=>toggle(`${prefix}_${i}`)}>
            {on?"✓":i+1}
          </div>
        );
      })}
    </div>
  );
}

/* ════════════════════════════════
   CHECK ROW  (단일 체크)
════════════════════════════════ */
function ChkRow({ label, ck, checks, toggle, color, icon="✅" }) {
  const done=!!checks[ck];
  return (
    <div onClick={()=>toggle(ck)}
      style={{display:"flex",alignItems:"center",gap:14,
        padding:"14px 16px",borderRadius:14,marginBottom:8,
        background:done?`${color}14`:"#fafafa",
        border:`2px solid ${done?color:"#e8e8e8"}`,
        cursor:"pointer",transition:"all .15s",userSelect:"none"}}>
      <div style={{width:42,height:42,borderRadius:"50%",flexShrink:0,
        background:done?color:"white",border:`3px solid ${done?color:"#ccc"}`,
        display:"flex",alignItems:"center",justifyContent:"center",
        fontSize:18,fontWeight:900,color:"white",transition:"all .18s"}}>
        {done?"✓":""}
      </div>
      <span style={{fontSize:22}}>{icon}</span>
      <span style={{fontSize:17,fontWeight:900,
        color:done?color:C.dark,
        transition:"all .2s"}}>
        {done ? "다했어요! 🎉" : label}
      </span>
    </div>
  );
}

/* ════════════════════════════════
   OPT ROW  (완료 / 없음)
════════════════════════════════ */
function OptRow({ label, ck, checks, toggle, color, icon="📖" }) {
  const val=checks[ck]??null;
  const isDone=val==="done", isNA=val==="na", isOk=isDone||isNA;
  const handleDone=e=>{ e.stopPropagation(); toggle(ck,isDone?null:"done"); };
  const handleNA  =e=>{ e.stopPropagation(); toggle(ck,isNA  ?null:"na");   };
  return (
    <div style={{borderRadius:14,marginBottom:8,overflow:"hidden",
      border:`2px solid ${isOk?color:"#e8e8e8"}`,
      background:isOk?`${color}10`:"#fafafa",transition:"all .15s"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px 8px"}}>
        <span style={{fontSize:20}}>{icon}</span>
        <span style={{fontSize:17,fontWeight:900,
          color:isDone?color:isNA?"#636e72":C.dark,
          transition:"all .2s",flex:1}}>
          {isDone ? "다했어요! 🎉" : isNA ? "없어요! ✔" : label}
        </span>
      </div>
      <div style={{display:"flex",gap:8,padding:"0 12px 12px"}}>
        <button className="chk-btn" onClick={handleDone}

/* ════════════════════════════════
   HISTORY  (일주일 / 한 달)
════════════════════════════════ */
function History({ onClose }) {
  const [tab, setTab] = useState("week");
  const [histData, setHistData] = useState(()=>ls.get("hw_history", {}));
  const [confirmReset, setConfirmReset] = useState(false);
  const history = histData;

  const doReset = () => {
    ls.set("hw_history", {});
    setHistData({});
    setConfirmReset(false);
  };

  const getDates = (n) => {
    const result = [];
    let offset = 0;
    while (result.length < n) {
      const d = new Date(); d.setDate(d.getDate()-offset);
      const day = d.getDay();
      if (day !== 0 && day !== 6) {
        result.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`);
      }
      offset++;
    }
    return result.reverse();
  };

  const dates = getDates(tab==="week" ? 5 : 22);

  const fmtDate = (s) => {
    const [,m,d] = s.split("-");
    const day = DAYS_KO[new Date(s).getDay()];
    return `${+m}/${+d}(${day})`;
  };

  return (
    <div style={{position:"fixed",inset:0,zIndex:2000,display:"flex",
      alignItems:"center",justifyContent:"center",
      background:"rgba(0,0,0,.5)",backdropFilter:"blur(4px)"}}
      onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:"white",borderRadius:28,
        padding:"26px 20px 30px",width:"92%",maxWidth:540,
        animation:"scaleIn .25s ease",boxShadow:"0 12px 40px rgba(0,0,0,.18)",
        maxHeight:"85vh",overflowY:"auto"}}>
        <div style={{display:"flex",justifyContent:"space-between",
          alignItems:"center",marginBottom:18}}>
          <h2 style={{fontSize:20,fontWeight:900,color:C.dark}}>📊 완료 기록</h2>
          <div style={{display:"flex",gap:8}}>
            <button className="bb" onClick={()=>setConfirmReset(true)}
              style={{background:"#F0F0F0",color:C.gray,border:"2px solid #ddd",fontSize:13,padding:"8px 14px"}}>
              🗑️ 초기화
            </button>
            <button className="bb" onClick={onClose}
              style={{background:"#F0F0F0",color:C.gray,fontSize:13,padding:"8px 14px"}}>닫기</button>
          </div>
        </div>

        {/* 인앱 확인 다이얼로그 */}
        {confirmReset && (
          <div style={{background:"#FFF8F0",border:"2.5px solid #FFD93D",borderRadius:16,
            padding:"18px 20px",marginBottom:18,textAlign:"center"}}>
            <div style={{fontSize:16,fontWeight:800,color:C.dark,marginBottom:14}}>
              기록을 초기화 하시겠습니까?
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"center"}}>
              <button className="bb" onClick={doReset}
                style={{padding:"12px 28px",background:"#5EAAB5",color:"white",fontSize:15}}>
                확인
              </button>
              <button className="bb" onClick={()=>setConfirmReset(false)}
                style={{padding:"12px 28px",background:"#F0F0F0",color:C.gray,fontSize:15}}>
                취소
              </button>
            </div>
          </div>
        )}
        {/* tab */}
        <div style={{display:"flex",gap:8,marginBottom:18}}>
          {[["week","최근 1주(평일)"],["month","최근 1달(평일)"]].map(([v,l])=>(
            <button key={v} className="bb" onClick={()=>setTab(v)}
              style={{flex:1,padding:"11px",
                background:tab===v?"#5EAAB5":"white",
                border:"2.5px solid #5EAAB5",
                color:tab===v?"white":"#5EAAB5",fontSize:14}}>
              {l}
            </button>
          ))}
        </div>
        {/* grid */}
        <div style={{display:"grid",
          gridTemplateColumns:tab==="week"?"repeat(5,1fr)":"repeat(5,1fr)",
          gap:6}}>
          {dates.map(date=>{
            const rec=history[date];
            const isToday=date===TODAY;
            const done=rec?.done??false;
            return (
              <div key={date}
                style={{borderRadius:12,padding:"8px 4px",textAlign:"center",
                  background:done?"#2ED57318":isToday?"#5EAAB512":"#f8f8f8",
                  border:`2px solid ${done?"#2ED573":isToday?"#5EAAB5":"#ececec"}`}}>
                <div style={{fontSize:11,fontWeight:700,
                  color:isToday?"#5EAAB5":C.gray,marginBottom:4}}>
                  {fmtDate(date)}
                </div>
                <div style={{fontSize:22}}>
                  {done?"✅":isToday?"⭐":"—"}
                </div>
                {rec?.pct!=null&&(
                  <div style={{fontSize:10,fontWeight:800,
                    color:done?"#2ED573":"#bbb",marginTop:2}}>
                    {rec.pct}%
                  </div>
                )}
              </div>
            );
          })}
        </div>
        {/* summary */}
        {(() => {
          const total=dates.length;
          const completed=dates.filter(d=>history[d]?.done).length;
          return (
            <div style={{marginTop:18,background:"#5EAAB510",
              borderRadius:14,padding:"14px 18px",
              display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <span style={{fontWeight:800,fontSize:15,color:C.dark}}>
                {tab==="week"?"1주일":"한 달"} 완료율
              </span>
              <span style={{fontWeight:900,fontSize:22,color:"#5EAAB5"}}>
                {total===0?0:Math.round((completed/total)*100)}%
                <span style={{fontSize:14,fontWeight:700,color:"#aaa",marginLeft:6}}>
                  ({completed}/{total}일)
                </span>
              </span>
            </div>
          );
        })()}
      </div>
    </div>
  );
}

/* ════════════════════════════════
   MAIN APP
════════════════════════════════ */
function App() {
  const [name,      setName]      = useState(()=>ls.get("hw_name",""));
  const [showNamePopup, setShowNamePopup] = useState(()=>!ls.get("hw_name",""));
  const [checks,    setChecks]    = useState(()=>ls.get(`hw_checks_${TODAY}`,{}));
  const [dayMode,   setDayMode]   = useState("comprehensive");
  const [links,     setLinks]     = useState(()=>ls.get("hw_links",DEFAULT_LINKS));
  const [showDone,  setShowDone]  = useState(false);
  const [showHist,  setShowHist]  = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [doneShown, setDoneShown] = useState(false);
  const [showHome,  setShowHome]  = useState(true);
  const [theme,     setThemeState] = useState(()=>ls.get("hw_theme","flower"));
  const setTheme = (t)=>{ setThemeState(t); ls.set("hw_theme",t); };

  useEffect(()=>{
    const d=new Date().getDay();
    setDayMode([1,3,5].includes(d)?"comprehensive":"listening");
  },[]);

  const saveName = useCallback((n)=>{ setName(n); ls.set("hw_name",n); },[]);

  const items = useMemo(()=>getItems(dayMode),[dayMode]);
  const progress = useMemo(()=>countProgress(items,checks),[items,checks]);

  /* save checks & history */
  useEffect(()=>{
    ls.set(`hw_checks_${TODAY}`, checks);
    const {pct, done, total} = progress;
    const isDone = total>0 && done===total;
    const hist = ls.get("hw_history",{});
    hist[TODAY] = { pct, done: isDone };
    ls.set("hw_history", hist);
    if(isDone && !doneShown){ setShowDone(true); setDoneShown(true); }
  },[checks, progress]);

  /* reset doneShown on mode change */
  useEffect(()=>{ setDoneShown(false); },[dayMode]);

  const toggle = useCallback((k, val=undefined)=>{
    setChecks(p=>{
      if(val===undefined) return {...p,[k]:!p[k]};
      const n={...p};
      if(val===null) delete n[k]; else n[k]=val;
      return n;
    });
  },[]);

  const handleModeChange = (m) => {
    setDayMode(m);
    setChecks(ls.get(`hw_checks_${TODAY}`,{}));
    setDoneShown(false);
    setShowDone(false);
  };

  if(showHome) return <HomeScreen name={name} onStart={()=>setShowHome(false)}/>;

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(180deg, #E8F8F5 0%, #F0FFFE 40%, #E0F7F2 100%)",fontFamily:"'Noto Sans KR','Nunito',sans-serif",
      }}>
      <Header
        name={name}
        onGoHome={()=>setShowHome(true)}
        onShowHistory={()=>setShowHist(true)}
        onShowSettings={()=>setShowSettings(true)}
      />
      <DayToggle mode={dayMode} setMode={handleModeChange}/>

      {dayMode==="listening"
        ? <ListeningBoard checks={checks} toggle={toggle} links={links}/>
        : <ComprehensiveBoard checks={checks} toggle={toggle} links={links}/>
      }

      <FloatingProgress {...progress} theme={theme}/>

      {showDone && (
        <DonePopup name={name} theme={theme} onClose={()=>setShowDone(false)}/>
      )}
      {showHist  && <History     onClose={()=>setShowHist(false)}/>}
      {showSettings && <Settings links={links} setLinks={setLinks}
        name={name} onChangeName={saveName}
        theme={theme} setTheme={setTheme}
        onClose={()=>setShowSettings(false)}/>}
      {showNamePopup && (
        <NamePopup onDone={(n)=>{ saveName(n); setShowNamePopup(false); }}/>
      )}

      <div style={{textAlign:"center",padding:"20px 0 14px",
        fontSize:9,fontWeight:300,color:"#d5d5d5",letterSpacing:".2px"}}>
        created by 이츠써니
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
  </script>
</body>
</html>
