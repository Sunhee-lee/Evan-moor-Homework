<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D4F0F7"/>
      <stop offset="100%" stop-color="#A8D8EA"/>
    </linearGradient>
    <linearGradient id="coverL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5EAAB5"/>
      <stop offset="100%" stop-color="#6BBCC7"/>
    </linearGradient>
    <linearGradient id="coverR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6BBCC7"/>
      <stop offset="100%" stop-color="#5EAAB5"/>
    </linearGradient>
  </defs>
  <!-- rounded background -->
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bg)"/>
  <!-- book shadow -->
  <ellipse cx="256" cy="410" rx="140" ry="18" fill="#5A8FA0" opacity="0.15"/>
  <!-- left cover (outer) -->
  <path d="M72 120 Q72 100 92 100 L248 100 L248 380 L92 380 Q72 380 72 360 Z" fill="url(#coverL)" stroke="#5A8FA0" stroke-width="4"/>
  <!-- right cover (outer) -->
  <path d="M264 100 L420 100 Q440 100 440 120 L440 360 Q440 380 420 380 L264 380 Z" fill="url(#coverR)" stroke="#5A8FA0" stroke-width="4"/>
  <!-- left page -->
  <path d="M92 115 L242 115 L242 370 L92 370 Q82 370 82 360 L82 125 Q82 115 92 115 Z" fill="white" stroke="#9AC0CA" stroke-width="1.5"/>
  <!-- right page -->
  <path d="M270 115 L420 115 Q430 115 430 125 L430 360 Q430 370 420 370 L270 370 Z" fill="white" stroke="#9AC0CA" stroke-width="1.5"/>
  <!-- spine -->
  <rect x="245" y="98" width="22" height="284" rx="4" fill="#5A8FA0" opacity="0.3"/>
  <line x1="256" y1="100" x2="256" y2="380" stroke="#5A8FA0" stroke-width="2" opacity="0.5"/>
  <!-- page lines left -->
  <line x1="108" y1="165" x2="228" y2="165" stroke="#8DD8CC" stroke-width="2" opacity="0.4"/>
  <line x1="108" y1="190" x2="228" y2="190" stroke="#8DD8CC" stroke-width="2" opacity="0.3"/>
  <line x1="108" y1="295" x2="228" y2="295" stroke="#8DD8CC" stroke-width="2" opacity="0.4"/>
  <line x1="108" y1="320" x2="228" y2="320" stroke="#8DD8CC" stroke-width="2" opacity="0.3"/>
  <!-- page lines right -->
  <line x1="284" y1="165" x2="414" y2="165" stroke="#8DD8CC" stroke-width="2" opacity="0.4"/>
  <line x1="284" y1="190" x2="414" y2="190" stroke="#8DD8CC" stroke-width="2" opacity="0.3"/>
  <line x1="284" y1="295" x2="414" y2="295" stroke="#8DD8CC" stroke-width="2" opacity="0.4"/>
  <line x1="284" y1="320" x2="414" y2="320" stroke="#8DD8CC" stroke-width="2" opacity="0.3"/>
  <!-- EVAN text on left page -->
  <text x="168" y="260" text-anchor="middle" font-family="'Arial Black','Helvetica','sans-serif'" font-weight="900" font-size="52" fill="#2A6B7C" letter-spacing="2">EVAN</text>
  <!-- HWK text on right page -->
  <text x="349" y="260" text-anchor="middle" font-family="'Arial Black','Helvetica','sans-serif'" font-weight="900" font-size="52" fill="#2A6B7C" letter-spacing="2">HWK</text>
</svg>
